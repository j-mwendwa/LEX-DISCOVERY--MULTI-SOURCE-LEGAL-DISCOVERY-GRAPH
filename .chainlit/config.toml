[project]
# Whether to enable telemetry (default: true). No personal data is collected.
enable_telemetry = false

[features]
prompt_playground = false     # Disable prompt playground tab
multi_modal = true            # Enable file uploads
spontaneous_file_upload = true

[features.audio]
enabled = false

[UI]
name = "LEX-DISCOVERY"
description = "Multi-Source Legal Discovery Graph — AI-powered Kenya tenancy law analysis"
# ⚠️ Replace with your custom logo path if needed
# logo = "public/logo.png"
favicon = "public/favicon.ico"
default_theme = "dark"

[UI.theme]
default = "dark"

  [UI.theme.light]
  background = "#F8F9FA"
  paper = "#FFFFFF"

    [UI.theme.light.primary]
    main = "#1E3A5F"
    dark = "#152C47"
    light = "#2D5687"

  [UI.theme.dark]
  background = "#0D1117"
  paper = "#161B22"

    [UI.theme.dark.primary]
    main = "#4A9FD5"
    dark = "#2E7DB5"
    light = "#6BB5E3"

[meta]
generated_by = "1.3.0"
